server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Runtime config written by docker/40-journal-config.sh at startup.
    # Must never be cached — the whole point of runtime injection is
    # that rotating JOURNAL_API_TOKEN takes effect on the next request,
    # not after a browser cache expiry. `location =` is an exact match
    # and has higher precedence than `location /` below.
    location = /config.js {
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    # SPA routing - serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html is the entry point that references the content-hashed
    # /assets/* bundles. It must NEVER be cached: a cached index.html
    # survives a redeploy and keeps pointing at old asset hashes that the
    # new image no longer contains, so the app fails to load its JS chunks
    # (symptom: a route renders blank / with no content after a deploy).
    # `no-cache` lets the browser revalidate via ETag (cheap 304 when
    # unchanged) but always fetch fresh HTML after a deploy. The try_files
    # internal redirect above re-enters location matching, so this exact
    # match applies to every SPA route, not just a literal /index.html hit.
    location = /index.html {
        add_header Cache-Control "no-cache" always;
    }

    # Proxy API requests to journal-server
    location /api/ {
        client_max_body_size 20m;
        proxy_pass http://journal-server:8400;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
