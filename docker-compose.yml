services:
  webapp:
    image: ghcr.io/johnmathews/journal-webapp:latest
    ports:
      - "8402:80"
    environment:
      # Bearer token written to /config.js at container startup by
      # docker/40-journal-config.sh. Must match journal-server's
      # JOURNAL_API_TOKEN. See docs/deployment.md (Runtime token injection).
      - JOURNAL_API_TOKEN=${JOURNAL_API_TOKEN:?set JOURNAL_API_TOKEN in .env or the shell environment}
    depends_on:
      - journal-server
    restart: unless-stopped

  journal-server:
    image: ghcr.io/johnmathews/journal-server:latest
    ports:
      - "8400:8400"
    environment:
      - DB_PATH=/data/journal.db
      - CHROMADB_HOST=journal-chromadb
      - CHROMADB_PORT=8000
      - JOURNAL_API_TOKEN=${JOURNAL_API_TOKEN:?set JOURNAL_API_TOKEN in .env or the shell environment}
    volumes:
      - journal-data:/data
    depends_on:
      journal-chromadb:
        condition: service_healthy

  journal-chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8401:8000"
    volumes:
      - chromadb-data:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  journal-data:
  chromadb-data:
